<!DOCTYPE html>
<html>
<head>
  <title>Simple Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ece5dd; /* WhatsApp-style background */
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    #chatWindow {
      border: 1px solid #ccc;
      background: #fff;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .message {
      margin: 5px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
      clear: both;
    }

    .mine {
      background: #34b7f1;
      color: white;
      float: right;
      text-align: right;
    }

    .theirs {
      background: #f0f0f0;
      float: left;
      text-align: left;
    }

    .timestamp {
      display: block;
      font-size: 0.75em;
      color: #888;
      margin-top: 3px;
    }

    #messageInput {
      width: 70%;
      padding: 10px;
      margin-top: 10px;
    }

    #sendButton {
      padding: 10px 15px;
      margin-left: 5px;
      background: #34b7f1;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #sendButton:hover {
      background: #128c7e;
    }
  </style>
</head>
<body>
  <h1>Simple Chat</h1>
  <div id="chatWindow"></div>
  <input type="text" id="messageInput" placeholder="Type a message..." />
  <button id="sendButton" onclick="sendMessage()">Send</button>

  <script src="chat.js"></script>
</body>
</html>
