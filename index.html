<!DOCTYPE html>
<html>
<head>
  <title>Shared Chat</title>
  <style>
    body { background:#121212; color:#eee; font-family:sans-serif; text-align:center; }
    #messages { border:1px solid #444; width:60%; margin:auto; height:200px; overflow-y:scroll; padding:10px; text-align:left; background:#1f1f1f; }
    .msg { margin:5px 0; }
    .sender { color:#90caf9; font-weight:bold; }
    input, button { margin:5px; padding:8px; border-radius:4px; border:1px solid #444; background:#1f1f1f; color:#eee; }
  </style>
</head>
<body>
  <h1>Simple Shared Chat</h1>
  <div id="messages"></div>
  <input type="text" id="chatInput" placeholder="Type a message">
  <button onclick="sendMessage()">Send</button>

  <script>
    const dataUrl = "messages.json"; // file in your repo

    async function loadMessages(){
      const res = await fetch(dataUrl + "?t=" + Date.now()); // prevent caching
      const msgs = await res.json();
      const box = document.getElementById("messages");
      box.innerHTML = "";
      msgs.forEach(m=>{
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<span class="sender">${m.sender}:</span> ${m.text}`;
        box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
    }

    function sendMessage(){
      const text = document.getElementById("chatInput").value.trim();
      if(!text) return;
      alert("To share this message, edit messages.json in GitHub and add it there.");
      document.getElementById("chatInput").value = "";
    }

    loadMessages();
    setInterval(loadMessages, 5000); // refresh every 5s
  </script>
</body>
</html>
