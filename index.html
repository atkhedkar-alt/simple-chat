<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Chat</title>
</head>
<body>
  <h1>Simple Chat</h1>

  <style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f9;
    margin: 20px;
  }

  h1 {
    text-align: center;
  }

  #chatWindow {
    border: 1px solid #ccc;
    background: #fff;
    height: 400px;
    overflow-y: auto;
    padding: 10px;
    margin-top: 20px;
  }

    .timestamp {
  display: block;
  font-size: 0.75em;
  color: #888;
  margin-top: 3px;
}

    #chatWindow {
  border: 1px solid #ccc;
  background: #fff;
  height: 400px;
  overflow-y: auto;
  padding: 10px;
  margin-top: 20px;
}

.message {
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
  clear: both;
}

.mine {
  background: #2196f3;
  color: white;
  float: right;
  text-align: right;
}

.theirs {
  background: #e0e0e0;
  float: left;
  text-align: left;
}

  #chatWindow div {
    background: #e1f5fe;
    margin: 5px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
  }

  input[type="text"] {
    width: 70%;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }

  button {
    padding: 10px 15px;
    margin-left: 5px;
    background: #2196f3;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background: #1976d2;
  }
</style>


  <!-- Chat messages will load here -->
  <div id="chat"></div>

  <!-- Input + Send button -->
  <input id="chatInput" type="text" placeholder="Type a message...">
  <button onclick="sendMessage()">Send</button>

  <!-- Script to refresh messages every 5 seconds -->
  <script>
    async function loadMessages(){
      const repo = "atkhedkar-alt/simple-chat"; // replace with your repo
      const path = "messages.json";

      let res = await fetch(`https://raw.githubusercontent.com/${repo}/main/${path}`);
      let messages = await res.json();

      let chatDiv = document.getElementById("chat");
      chatDiv.innerHTML = "";
      messages.forEach(msg => {
        let p = document.createElement("p");
        p.textContent = msg.sender + ": " + msg.text;
        chatDiv.appendChild(p);
      });
    }

    loadMessages();
    setInterval(loadMessages, 5000); // refresh every 5s
  </script>

  <!-- External JS file with Send button logic -->
  <script src="chat.js"></script>
</body>
</html>
